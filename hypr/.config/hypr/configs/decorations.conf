
# Sourcing colors generated by wallust
source = $HOME/.config/hypr/wallust/wallust-hyprland.conf
source = $HOME/.config/hypr/configs/vars.conf

general {
  border_size = 2
  gaps_in = $gap_inner
  gaps_out = $gap_outer

  col.active_border = $color14 $color13 $color1 45deg
  col.inactive_border = $background

}

decoration {
  rounding = 10

  active_opacity = 1.0
  inactive_opacity = 1.0
  fullscreen_opacity = 1.0

  dim_inactive = true
  dim_strength = 0.2
  dim_special = 0

  shadow {
    enabled = false
  }


  blur {
    enabled = true
    size = 8
    passes = 2
    ignore_opacity = true
    new_optimizations = true
    special = false
    popups = true
  }
}

