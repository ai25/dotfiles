
# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=,preferred,auto,1

# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# Execute your favorite apps at launch
exec-once = syncthing
exec-once = ghostty --gtk-single-instance=true --initial-window=false --quit-after-last-window-closed=false -e zsh
exec-once = eww daemon && eww open bar

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

# Set programs that you use
$terminal = ghostty --gtk-single-instance=true
$fileManager = thunar
$menu = rofi -lines 12 -padding 18 -width 60 -location 0 -show drun -sidebar-mode -columns 3 -font 'Noto Sans 8'

# Some default env vars.
env = XCURSOR_SIZE,12
env = HYPRCURSOR_SIZE,12

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = false
    }
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    layout = dwindle
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false
    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 10
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

animations {
    enabled = yes, please :)

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = true # master switch for pseudotiling
    preserve_split = true
    force_split = 2 # 0 = split follows mouse, 1 = always split to the left, 2 = always split to the right
    smart_split = false # Split in the direction that creates the most balanced container
}

master {
    new_status = master
}

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    workspace_swipe = false
}

# Example windowrule v1
# windowrule = float, ^(kitty)$
windowrule = float,^(Viewnior)$
windowrule = float,^(feh)$
windowrule = float,^(Audacious)$
windowrule = float,^(File-roller)$
windowrule = float,^(Lxappearance)$
windowrule = float,^(Lxtask)$
windowrule = float,^(Pavucontrol)$

# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more

# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Return, exec, $terminal
bind = $mainMod SHIFT, Q, killactive,
bind = ALT, F4, killactive,
# bind = $mainMod, M, exit,
bind = $mainMod SHIFT, F, exec, $fileManager
bind = $mainMod, X, exec, $menu
# bind = $mainMod SHIFT, X, exec, i3lock -i ~/.wallpaper.png
bind = $mainMod SHIFT, G, exec, geany

# Screenshot
bind = , Print, exec, grimshot savecopy anything

# Move focus
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Move windows
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, j, movewindow, d

# Resize windows
binde = $mainMod SHIFT, left, resizeactive, -10 0
binde = $mainMod SHIFT, right, resizeactive, 10 0
binde = $mainMod SHIFT, up, resizeactive, 0 -10
binde = $mainMod SHIFT, down, resizeactive, 0 10
bind = $mainMod CTRL , h, resizeactive, -40 0
binde = $mainMod CTRL, l, resizeactive, 40 0
binde = $mainMod CTRL, j, resizeactive, 0 -40
binde = $mainMod CTRl, k, resizeactive, 0 40

# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scratchpad system
# Define special workspaces for each number
workspace = special:sp1, gapsout:30, gapsin:5
workspace = special:sp2, gapsout:30, gapsin:5
workspace = special:sp3, gapsout:30, gapsin:5
workspace = special:sp4, gapsout:30, gapsin:5
workspace = special:sp5, gapsout:30, gapsin:5
workspace = special:sp6, gapsout:30, gapsin:5
workspace = special:sp7, gapsout:30, gapsin:5
workspace = special:sp8, gapsout:30, gapsin:5
workspace = special:sp9, gapsout:30, gapsin:5
workspace = special:sp0, gapsout:30, gapsin:5

# Move windows to scratchpads
bind = $mainMod SHIFT ALT, 1, movetoworkspace, special:sp1
bind = $mainMod SHIFT ALT, 2, movetoworkspace, special:sp2
bind = $mainMod SHIFT ALT, 3, movetoworkspace, special:sp3
bind = $mainMod SHIFT ALT, 4, movetoworkspace, special:sp4
bind = $mainMod SHIFT ALT, 5, movetoworkspace, special:sp5
bind = $mainMod SHIFT ALT, 6, movetoworkspace, special:sp6
bind = $mainMod SHIFT ALT, 7, movetoworkspace, special:sp7
bind = $mainMod SHIFT ALT, 8, movetoworkspace, special:sp8
bind = $mainMod SHIFT ALT, 9, movetoworkspace, special:sp9
bind = $mainMod SHIFT ALT, 0, movetoworkspace, special:sp0

# Toggle scratchpads
bind = $mainMod ALT, 1, togglespecialworkspace, sp1
bind = $mainMod ALT, 2, togglespecialworkspace, sp2
bind = $mainMod ALT, 3, togglespecialworkspace, sp3
bind = $mainMod ALT, 4, togglespecialworkspace, sp4
bind = $mainMod ALT, 5, togglespecialworkspace, sp5
bind = $mainMod ALT, 6, togglespecialworkspace, sp6
bind = $mainMod ALT, 7, togglespecialworkspace, sp7
bind = $mainMod ALT, 8, togglespecialworkspace, sp8
bind = $mainMod ALT, 9, togglespecialworkspace, sp9
bind = $mainMod ALT, 0, togglespecialworkspace, sp0

# Default scratchpad
bind = $mainMod SHIFT, minus, movetoworkspace, special
bind = $mainMod, minus, togglespecialworkspace,

# Scroll through existing workspaces
bind = ALT CONTROL, right, workspace, e+1
bind = ALT CONTROL, left, workspace, e-1

# Volume control with overlay
bind = , XF86AudioRaiseVolume, exec, ~/.config/eww/scripts/show-overlay volume up
bind = , XF86AudioLowerVolume, exec, ~/.config/eww/scripts/show-overlay volume down
bind = , XF86AudioMute, exec, ~/.config/eww/scripts/show-overlay volume mute

# Brightness control with overlay
bind = , XF86MonBrightnessUp, exec, ~/.config/eww/scripts/show-overlay brightness up
bind = , XF86MonBrightnessDown, exec, ~/.config/eww/scripts/show-overlay brightness down

# Media control
bind = , XF86AudioNext, exec, mpc next
bind = , XF86AudioPrev, exec, mpc prev
bind = , XF86AudioPlay, exec, mpc toggle
bind = , XF86AudioStop, exec, mpc stop

# Toggle floating
bind = $mainMod, SPACE, togglefloating,

# Fullscreen
bind = $mainMod, F, fullscreen,

# Layout
bind = $mainMod, S, togglesplit,
bind = $mainMod SHIFT, W, layoutmsg, orientationtop

# Focus between floating/tiling
bind = $mainMod SHIFT, SPACE, togglefloating,


