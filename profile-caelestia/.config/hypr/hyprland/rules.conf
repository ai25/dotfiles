# =========================================================
# Window + layer rules (organised)
# Strategy:
#   1) Tag apps (identity)
#   2) Apply behaviour by tag (float/opacity/workspace/etc)
#   3) Keep only true exceptions as app-specific overrides
# Notes:
#   - Later rules override earlier ones if they touch the same property.
# =========================================================

# -------------------------
# Base defaults / global
# -------------------------
windowrule = opacity $windowOpacity override, match:fullscreen false

# Always opaque (either they handle transparency themselves or you want solid)
windowrule = opaque true, match:class foot|equibop|org\.quickshell|imv|swappy

# Centre all floating windows (but avoid XWayland popups)
windowrule = center true, match:float true, match:xwayland false


# =========================================================
# 1) TAGGING (identity only)
# =========================================================

# --- Browser
windowrule = tag +browser, match:class ^([Ff]irefox|org\.mozilla\.firefox|[Ff]irefox-esr|[Ff]irefox-bin|[Ll]ibrewolf)$
windowrule = tag +browser, match:class ^([Gg]oogle-chrome(-beta|-dev|-unstable)?)$
windowrule = tag +browser, match:class ^(chrome-.+-Default)$
windowrule = tag +browser, match:class ^([Cc]hromium)$
windowrule = tag +browser, match:class ^([Mm]icrosoft-edge(-stable|-beta|-dev|-unstable))$
windowrule = tag +browser, match:class ^([Bb]rave-browser(-beta|-dev|-unstable)?)$
windowrule = tag +browser, match:class ^([Ff]ree[Tt]ube(-bin)?)$
windowrule = tag +browser, match:class ^([Tt]horium-browser|[Cc]achy-browser)$
windowrule = tag +browser, match:class ^(zen-alpha|zen)$

# --- Notifications / panels
windowrule = tag +notif, match:class ^(swaync-control-center|swaync-notification-window|swaync-client|class)$

# --- Terminals
windowrule = tag +terminal, match:class ^(Alacritty|kitty|kitty-dropterm|com\.mitchellh\.ghostty|foot)$

# --- Email
windowrule = tag +email, match:class ^([Tt]hunderbird|org\.gnome\.Evolution|eu\.betterbird\.Betterbird)$

# --- Projects / IDEs
windowrule = tag +projects, match:class ^(codium|codium-url-handler|VSCodium|VSCode|code-url-handler|jetbrains-.+)$

# --- Screenshare / recording
windowrule = tag +screenshare, match:class ^(com\.obsproject\.Studio)$

# --- IM
windowrule = tag +im, match:class ^([Dd]iscord|[Ww]ebCord|[Vv]esktop|[Ff]erdium|[Ww]hatsapp-for-linux|ZapZap|com\.rtosta\.zapzap|org\.telegram\.desktop|io\.github\.tdesktop_x64\.TDesktop|teams-for-linux|equibop)$

# --- Games / game related
windowrule = tag +games, match:class ^(gamescope|steam_app_\d+)$
windowrule = tag +gamestore, match:class ^([Ss]team|com\.heroicgameslauncher\.hgl)$
windowrule = tag +gamestore, match:title ^([Ll]utris)$

# --- File managers
windowrule = tag +file-manager, match:class ^([Tt]hunar|org\.gnome\.Nautilus|[Pp]cmanfm-qt|app\.drey\.Warp)$

# --- Wallpaper tools
windowrule = tag +wallpaper, match:class ^([Ww]aytrogen)$

# --- Multimedia
windowrule = tag +multimedia, match:class ^([Aa]udacious|feishin|Spotify|Supersonic|Cider)$
windowrule = tag +multimedia_video, match:class ^([Mm]pv|vlc|com\.github\.rafostar\.Clapper)$

# --- Settings / utilities (anything you generally want floating)
windowrule = tag +settings, match:class ^(yad|zenity|wev|blueman-manager|system-config-printer|org\.gnome\.Settings|nwg-look| org\.pulseaudio\.pavucontrol|pavucontrol|com\.saivert\.pwvucontrol|yad-icon-browser| nm-applet|nm-connection-editor|qt5ct|qt6ct|xdg-desktop-portal-gtk| org\.kde\.polkit-kde-authentication-agent-1|Rofi|rofi| org\.gnome\.FileRoller|file-roller|com\.github\.GradienceTeam\.Gradience| gnome-disks|wihotspot(-gui)?|([Bb]aobab|org\.gnome\.[Bb]aobab))$

# --- Viewers (generally floating)
windowrule = tag +viewer, match:class ^(evince|eog|org\.gnome\.Loupe|gnome-system-monitor|org\.gnome\.SystemMonitor|io\.missioncenter\.MissionCenter|imv|feh|nomacs)$

# --- Task manager by title (special tag)
windowrule = tag +taskmanager, match:title ^(Task Manager.*)$


# =========================================================
# 2) GENERIC BEHAVIOUR BY TAG
# =========================================================

# ---- Workspace placement
windowrule = workspace 1, match:tag email*
windowrule = workspace 3, match:tag file-manager*
windowrule = workspace 4 silent, match:tag screenshare*
# windowrule = workspace 9 silent, match:tag multimedia*
# windowrule = workspace 9 silent, match:tag multimedia_video*
windowrule = workspace 10 silent, match:class ^(hyprland-dialog), match:title ^(Application Not Responding)

# ---- Floating defaults
windowrule = float on, match:tag settings*
windowrule = float on, match:tag viewer*
windowrule = float on, match:tag taskmanager

# ---- Default sizing for common float groups
windowrule = size 70% 70%, match:tag settings*
windowrule = size 70% 70%, match:tag wallpaper*

# ---- Opacity by tag (single source of truth)
windowrule = opacity 1.0, match:tag multimedia_video*
windowrule = opacity 1 0.85, match:tag browser*
windowrule = opacity 0.9 0.8, match:tag projects*
windowrule = opacity 0.94 0.86, match:tag im*
windowrule = opacity 0.94 0.86, match:tag multimedia*
windowrule = opacity 0.9 0.8, match:tag file-manager*
windowrule = opacity 1 0.92, match:tag terminal*
windowrule = opacity 0.8 0.7, match:tag settings*
windowrule = opacity 0.82 0.75, match:tag viewer*
windowrule = opacity 0.9 0.7, match:tag wallpaper*

# ---- Tag-based overrides
windowrule = no_blur on, match:tag games*
windowrule = fullscreen on, match:tag games*
windowrule = no_blur on, match:tag multimedia_video*

# Avoid idle for fullscreen apps
windowrule = idle_inhibit fullscreen, match:fullscreen 1


# =========================================================
# 3) DIALOGS / POPUPS (generic patterns)
# =========================================================

# Generic file / progress / properties dialogs
windowrule = float true, match:title (Select|Open)( a)? (File|Folder)(s)?
windowrule = float true, match:title File (Operation|Upload)( Progress)?
windowrule = float true, match:title .* Properties
windowrule = float true, match:title Save As
windowrule = float true, match:title Library

# Auth dialogs
windowrule = float on, match:title ^(Authentication Required)$
windowrule = center on, match:title ^(Authentication Required)$

# “Popups inside apps” (negative title matches)
windowrule = float on, match:class (codium|codium-url-handler|VSCodium), match:title negative:(.*codium.*|.*VSCodium.*)
windowrule = float on, match:class ([Tt]hunar), match:title negative:(.*[Tt]hunar.*)
windowrule = center on, match:class ([Tt]hunar), match:title negative:(.*[Tt]hunar.*)
windowrule = float on, match:class ^([Ss]team)$, match:title negative:^([Ss]team)$

# Application Not Responding dialog (plus workspace above)
windowrule = size 50% 50%, match:class ^(hyprland-dialog), match:title ^(Application Not Responding)

# Add Folder to Workspace
windowrule = float on, match:title ^(Add Folder to Workspace)$
windowrule = size 70% 60%, match:title ^(Add Folder to Workspace)$
windowrule = center on, match:title ^(Add Folder to Workspace)$

# Open Files (by initial_title)
windowrule = float on, match:initial_title (Open Files)
windowrule = size 70% 60%, match:initial_title (Open Files)


# =========================================================
# 4) SPECIFIC APP EXCEPTIONS (only where needed)
# =========================================================

# Small tools you always want floating (but don’t need a dedicated tag)
windowrule = float true, match:class guifetch
windowrule = float true, match:class org\.quickshell

# Centre pavucontrol explicitly (you had this twice)
windowrule = center on, match:class ^(pavucontrol|org\.pulseaudio\.pavucontrol|com\.saivert\.pwvucontrol)$

# Gnome calculator
windowrule = float on, match:class (org\.gnome\.Calculator), match:title (Calculator)

# Qalculate / Tk
windowrule = float on, match:class ^([Qq]alculate-gtk)$
windowrule = float on, match:class Tk
windowrule = center on, match:class Tk
windowrule = size 1400 1000, match:class Tk
windowrule = workspace special:s2 silent, match:class Tk

windowrule = float on, match:initial_title ^(Serendipity.fm)$
windowrule = center on, match:initial_title ^(Serendipity.fm)$
windowrule = size 1600 1200, match:initial_title ^(Serendipity.fm)$
windowrule = workspace special:s1 silent, match:initial_title ^(Serendipity.fm)$

# Nomacs (viewer tag already floats it; keep only size/centre)
windowrule = center on, match:class ^nomacs$
windowrule = size 800 600, match:class ^nomacs$

# Foot nmtui (special sizing)
windowrule = float true, match:class foot, match:title nmtui
windowrule = size 60% 70%, match:class foot, match:title nmtui
windowrule = center 1, match:class foot, match:title nmtui

# “Settings-like” windows with specific sizes
windowrule = float true, match:class org\.gnome\.Settings
windowrule = size 70% 80%, match:class org\.gnome\.Settings
windowrule = center 1, match:class org\.gnome\.Settings

windowrule = float true, match:class org\.pulseaudio\.pavucontrol|yad-icon-browser
windowrule = size 60% 70%, match:class org\.pulseaudio\.pavucontrol|yad-icon-browser
windowrule = center 1, match:class org\.pulseaudio\.pavucontrol|yad-icon-browser

windowrule = float true, match:class nwg-look
windowrule = size 50% 60%, match:class nwg-look
windowrule = center 1, match:class nwg-look

# PiP (consolidated: accept “Picture in Picture” and “Picture-in-Picture” variants)
# If you rely on a script to resize/move later, keep these as “initial stabilisers”.
windowrule = float true, match:title Picture(-| )in(-| )[Pp]icture
windowrule = pin true, match:title Picture(-| )in(-| )[Pp]icture
windowrule = keep_aspect_ratio true, match:title Picture(-| )in(-| )[Pp]icture
windowrule = move 100%-w-2% 100%-w-3%, match:title Picture(-| )in(-| )[Pp]icture
windowrule = opacity 0.95 0.75, match:title ^(Picture-in-Picture)$

# Steam
windowrule = rounding 10, match:class steam
windowrule = float true, match:title Friends List, match:class steam
windowrule = immediate true, match:class steam_app_[0-9]+
windowrule = idle_inhibit always, match:class steam_app_[0-9]+

# ATLauncher console
windowrule = float true, match:class com-atlauncher-App, match:title ATLauncher Console

# Autodesk Fusion 360 (XWayland)
windowrule = no_blur true, match:title Fusion360|(Marking Menu), match:class fusion360\.exe

# XWayland “win1234” popups
windowrule = no_dim true, match:xwayland 1, match:title win[0-9]+
windowrule = no_shadow true, match:xwayland 1, match:title win[0-9]+
windowrule = rounding 10, match:xwayland 1, match:title win[0-9]+

# Extra per-app opacity overrides (leave only the ones you genuinely want to differ from tag defaults)
windowrule = opacity 0.8 0.7, match:class ^(gedit|org\.gnome\.TextEditor|mousepad)$
windowrule = opacity 0.9 0.8, match:class ^(deluge|transmisson-qt)$
windowrule = opacity 0.9 0.8, match:class ^(im\.riot\.Riot)$
windowrule = opacity 0.9 0.8, match:class ^(seahorse)$


# =========================================================
# Special workspaces (kept as explicit rules)
# =========================================================
windowrule = workspace special:sysmon, match:class btop
windowrule = workspace special:music, match:tag multimedia*
windowrule = workspace special:music, match:initial_title Spotify( Free)?
windowrule = workspace special:communication, match:tag im*
windowrule = workspace special:todo, match:class Todoist


# =========================================================
# Workspace rules
# =========================================================
workspace = w[tv1]s[false], gapsout:$singleWindowGapsOut
workspace = f[1]s[false], gapsout:$singleWindowGapsOut


# =========================================================
# Layer rules
# =========================================================
layerrule = animation fade, match:namespace hyprpicker
layerrule = animation fade, match:namespace logout_dialog
layerrule = animation fade, match:namespace selection
layerrule = animation fade, match:namespace wayfreeze

# Fuzzel / launcher
layerrule = animation popin 80%, match:namespace launcher
layerrule = blur true, match:namespace launcher

# Shell
layerrule = no_anim true, match:namespace caelestia-(border-exclusion|area-picker)
layerrule = animation fade, match:namespace caelestia-(drawers|background)
layerrule = blur true, match:namespace caelestia-drawers
layerrule = ignore_alpha 0.57, match:namespace caelestia-drawers

# Rofi / notifications blur
layerrule = blur on, match:namespace rofi
layerrule = ignore_alpha 0, match:namespace rofi
layerrule = blur on, match:namespace notifications
layerrule = ignore_alpha 0, match:namespace notifications


# =========================================================
# Task Manager (tagged above; behaviour here)
# =========================================================
windowrule = size 1300 1000, match:tag taskmanager
windowrule = center on, match:tag taskmanager

