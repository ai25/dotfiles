source = $HOME/.config/hypr/configs/vars.conf

bind = $mainMod, Return, exec, $terminal
bind = $mainMod SHIFT, Return, exec, $terminal -e tmux
bind = $mainMod SHIFT, Q, killactive,
bind = ALT, F4, killactive,
bind = $mainMod, X, exec, $menu
bind = $mainMod, R, exec, $scriptsDir/wallpaper/manual-refresh.sh ~/Wallpapers
bind = $mainMod, N, exec, swaync-client -t

# Clipshare
bind = $mainMod ALT, V, exec, CLIPSHARE_PASSWORD=1234 $scriptsDir/clipshare.py -s
bind = $mainMod ALT, C, exec, CLIPSHARE_PASSWORD=1234 $scriptsDir/clipshare.py -r

# Bind Ctrl+W to Ctrl+Backspace
bind = CTRL, W, exec, wtype -M ctrl -k BackSpace

# Bind Ctrl+Q to Ctrl+W
bind = CTRL, Q, exec, wtype -M ctrl -k w

# Toggle floating
bind = $mainMod, SPACE, togglefloating,

# Fullscreen
bind = $mainMod, F, fullscreen, 1
bind = $mainMod SHIFT, F, fullscreen, 0
bind = $mainMod, G, exec, $scriptsDir/toggle_resize.sh

# Layout
bind = $mainMod, S, togglesplit,
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, C, centerwindow

$scriptsDir = $HOME/.config/hypr/scripts

bind = CTRL ALT, Delete, exec, hyprctl dispatch exit 0 # exit Hyprland
bind = CTRL ALT, L, exec, $scriptsDir/lock-screen.sh # screen lock
bind = CTRL ALT, P, exec, $scriptsDir/wlogout.sh # power menu
bind = CTRL ALT, C, exec, $scriptsDir/hypridle.sh # power menu

bind = $mainMod, M, exec, hyprctl dispatch splitratio -0.6
bind = $mainMod SHIFT, M, exec, hyprctl dispatch splitratio 0.6

# # Press mouse button on key press
# bind = $mainMod SHIFT, Escape, exec, $scriptsDir/mouse_hold.sh press
# # Release mouse button on key release  
# bindr = $mainMod SHIFT, Escape, exec, $scriptsDir/mouse_hold.sh.sh release
# bind = $mainMod SHIFT, Escape, exec, echo "Press" >> /tmp/debug.log
# bindrl = $mainMod SHIFT, Escape, exec, echo "Release" >> /tmp/debug.log
# bind = $mainMod SHIFT, Escape, exec, notify-send "Press"
# bindr = $mainMod SHIFT, Escape, exec, notify-send "Release"
bind = $mainMod SHIFT, Escape, exec, wtype -B left
bindr = $mainMod SHIFT, Escape, exec, wtype -b left
bind = $mainMod, Escape, exec, wtype -c left
bind = $mainMod, A, exec, wtype -c right
# bindr = $mainMod SHIFT, Escape, exec, wtype -b left
# bindm = $mainMod, mouse:273, pass

# Resize windows
binde = $mainMod SHIFT, left, resizeactive,-50 0
binde = $mainMod SHIFT, right, resizeactive,50 0
binde = $mainMod SHIFT, up, resizeactive,0 -50
binde = $mainMod SHIFT, down, resizeactive,0 50

bindm = $mainMod, Control_L, movewindow
bindm = $mainMod, ALT_L, resizewindow

# Toggle OBS recording
bind = $mainMod ALT, R, exec, $scriptsDir/obs.py
# Discard
bind = $mainMod ALT, D, exec, $scriptsDir/obs.py --discard

# Screenshot
bind = , Print, exec, $scriptsDir/screenshot.sh
bind = ALT, Print, exec, $scriptsDir/screenshot.sh --ocr

# Volume control with overlay
bind = , XF86AudioRaiseVolume, exec, ~/.config/eww/scripts/show-overlay volume up
bind = , XF86AudioLowerVolume, exec, ~/.config/eww/scripts/show-overlay volume down
bind = , XF86AudioMute, exec, ~/.config/eww/scripts/show-overlay volume mute

# Brightness control with overlay
bind = , XF86MonBrightnessUp, exec, ~/.config/eww/scripts/show-overlay brightness up
bind = , XF86MonBrightnessDown, exec, ~/.config/eww/scripts/show-overlay brightness down

# Media control
bind = , XF86AudioNext, exec, mpc next
bind = , XF86AudioPrev, exec, mpc prev
bind = , XF86AudioPlay, exec, mpc toggle
bind = , XF86AudioStop, exec, mpc stop

# Move focus
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Move windows
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, j, movewindow, d

# Resize windows
binde = $mainMod SHIFT, left, resizeactive, -10 0
binde = $mainMod SHIFT, right, resizeactive, 10 0
binde = $mainMod SHIFT, up, resizeactive, 0 -10
binde = $mainMod SHIFT, down, resizeactive, 0 10
bind = $mainMod CTRL , h, resizeactive, -40 0
binde = $mainMod CTRL, l, resizeactive, 40 0
binde = $mainMod CTRL, j, resizeactive, 0 -40
binde = $mainMod CTRl, k, resizeactive, 0 40

# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10


# Move windows to scratchpads
bind = $mainMod SHIFT ALT, 1, movetoworkspace, special:s1
bind = $mainMod SHIFT ALT, 2, movetoworkspace, special:s2
bind = $mainMod SHIFT ALT, 3, movetoworkspace, special:s3
bind = $mainMod SHIFT ALT, 4, movetoworkspace, special:s4
bind = $mainMod SHIFT ALT, 5, movetoworkspace, special:s5
bind = $mainMod SHIFT ALT, 6, movetoworkspace, special:s6
bind = $mainMod SHIFT ALT, 7, movetoworkspace, special:s7
bind = $mainMod SHIFT ALT, 8, movetoworkspace, special:s8
bind = $mainMod SHIFT ALT, 9, movetoworkspace, special:s9
bind = $mainMod SHIFT ALT, 0, movetoworkspace, special:s0

# Toggle scratchpads
bind = $mainMod ALT, 1, togglespecialworkspace, s1
bind = $mainMod ALT, 2, togglespecialworkspace, s2
bind = $mainMod ALT, 3, togglespecialworkspace, s3
bind = $mainMod ALT, 4, togglespecialworkspace, s4
bind = $mainMod ALT, 5, togglespecialworkspace, s5
bind = $mainMod ALT, 6, togglespecialworkspace, s6
bind = $mainMod ALT, 7, togglespecialworkspace, s7
bind = $mainMod ALT, 8, togglespecialworkspace, s8
bind = $mainMod ALT, 9, togglespecialworkspace, s9
bind = $mainMod ALT, 0, togglespecialworkspace, s0

# Scroll through existing workspaces
bind = ALT CONTROL, right, workspace, e+1
bind = ALT CONTROL, left, workspace, e-1


