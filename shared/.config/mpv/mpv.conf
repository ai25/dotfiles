speed=1.5
# demuxer-max-bytes=800M
# demuxer-max-back-bytes=750M
# demuxer-readahead-secs=6000
cache=yes
cache-secs=6000
# fix hyprland scanout bug
target-colorspace-hint-mode=source
# af=dynaudnorm
title=${media-title} - ${chapter-metadata/by-key/title}
# disable ui to use modernz instead
osc=no
hr-seek=yes

# speed=1
# no-audio-pitch-correction
#
profile=fast
hwdec=auto
ytdl-raw-options=format=bestvideo[height<=1080]+bestaudio/best
